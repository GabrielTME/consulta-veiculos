  <style>
    * { box-sizing: border-box; }
    
    body { 
      margin: 0; 
      font-family: 'Helvetica', 'Arial', sans-serif; 
      display: flex; 
      height: 100vh; 
      background: #121212; 
    }
    
    .form-container { 
      background: #1E1E1E; 
      color: #FFFFFF; 
      border-right: 1px solid #2D2D2D; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      flex: 1; 
      overflow-y: auto; 
      padding: 30px 20px;
      font-family: 'Inter', sans-serif;
    }

    .form-container > div { max-width: 400px; width: 100%; }

    .field-group { 
      margin-bottom: 18px; 
      border-bottom: 1px solid #333; 
      padding-bottom: 14px; 
    }
    
    label { 
      display: block; 
      font-weight: 700; 
      margin-bottom: 8px; 
      color: #FFFFFF; 
      font-size: 12px; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
    }
    
    input[type="text"], input[type="number"], select { 
      width: 100%; 
      padding: 12px; 
      border-radius: 6px; 
      border: 1px solid #3A3A3A; 
      background: #161616; 
      color: #FFFFFF; 
      font-size: 14px; 
      transition: border-color 0.3s;
      font-family: 'Inter', sans-serif; 
      outline: none;
      display: block;
    }

    input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: #B90200; }

    .buttons { display: flex; gap: 12px; margin-top: 25px; }

    button { 
      padding: 12px; 
      border-radius: 6px; 
      border: none; 
      font-weight: 700; 
      cursor: pointer; 
      font-family: 'Inter', sans-serif; 
      transition: transform 0.1s, background-color 0.2s; 
    }

    button:active { transform: scale(0.97); }
    
    .btn-copiar, .plus-button, .btn-shortcut { 
      background: #B90200; 
      color: #FFFFFF; 
    }

    .btn-copiar:hover, .btn-shortcut:hover { background: #D60300; }
    
    .btn-copiar.success {
      background: #2e7d32 !important;
      color: #ffffff !important;
    }

    .btn-limpar { background: #333; color: #FFFFFF; flex: 1; }
    .btn-limpar:hover { background: #444; }
    .btn-copiar { flex: 1; }

    .plus-button { 
      width: 34px; height: 34px; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 24px; 
      line-height: 0; 
      padding: 0; 
      margin-top: 8px; 
      border-radius: 6px; 
    }

    .btn-shortcut { 
      height: 34px; 
      padding: 0 12px; 
      font-size: 11px; 
      margin-top: 8px; 
      border-radius: 6px; 
    }

    .checkbox-wrap { 
      display: flex; 
      align-items: center; 
      gap: 6px; 
      font-size: 12px; 
      color: #B5B5B5; 
      cursor: pointer; 
      margin-top: 5px; 
      font-weight: 700; 
    }

    input[type="checkbox"] { accent-color: #B90200; width: 16px; height: 16px; cursor: pointer; }

    .preview-container { 
      background: #121212; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      flex: 1; 
    }

    .whatsapp-message { 
      background: #0B141A; 
      color: #e9edef; 
      border-radius: 7.5px; 
      padding: 16px 20px; 
      max-width: 600px; 
      width: 100%;
      font-size: 18px; 
      line-height: 1.5; 
      white-space: pre-wrap; 
      outline: none;
      border: 1px solid #222; 
      cursor: text;
    }
    
    .whatsapp-message:focus { border-color: #B90200; }

    #previewMsg b { font-weight: bold; }
    
    .row-item { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; width: 100%; }
    .row-item input, .row-item select { flex: 1; }
  </style>
</head>

<body>
  <div class="form-container">
    <div>
      <div class="field-group">
        <label>Veículo</label>
        <input type="text" id="placa" oninput="onInputPlaca(event)" style="margin-bottom: 8px;">
        <div style="display: flex; gap: 6px;">
          <select id="marca" onchange="atualizarPreview()" style="flex: 1;">
            <option value=""></option>
          </select>
          <input type="text" id="modeloAno" oninput="atualizarPreview()" style="flex: 2;">
        </div>
      </div>

      <div class="field-group">
        <label>Proprietário</label>
        <input type="text" id="proprietario" oninput="onInputCapitalize(event)">
        <label class="checkbox-wrap">
          <input type="checkbox" id="proprietarioCnpj" onchange="atualizarPreview()"> CNPJ
        </label>
      </div>

      <div class="field-group">
        <label>Município / Procedência</label>
        <div style="display: flex; gap: 6px; margin-bottom: 8px;">
          <input type="text" id="emplacadoEm" oninput="onInputCapitalize(event)" style="flex: 2.5;">
          <select id="municipioEstado" onchange="atualizarPreview()" style="flex: 1;">
            <option value="">UF</option>
          </select>
        </div>
        <label class="checkbox-wrap">
          <input type="checkbox" id="temAnterior" onchange="atualizarPreview()"> Procedência anterior
        </label>
        <select id="emplacadoAnterior" style="display: none; margin-top:8px;" onchange="atualizarPreview()">
            <option value="">UF</option>
        </select>
      </div>

      <div class="field-group">
        <label>Financiamento</label>
        <div style="display: flex; gap: 15px; margin-bottom: 10px;">
          <label class="checkbox-wrap"><input type="checkbox" id="temFinanciamento" onchange="atualizarPreview()"> Possui</label>
          <label class="checkbox-wrap"><input type="checkbox" id="financiamentoIncluso" onchange="atualizarPreview()"> A ser incluído</label>
        </div>
        <div id="financiamentoCampos" style="display: none; flex-direction: column; gap: 8px; width: 100%;">
          <div style="display: flex; gap: 6px; width: 100%;">
            <select id="financiamentoSelect" onchange="document.getElementById('financiamentoInfo').value = this.value; atualizarPreview();" style="flex: 1;">
              <option value="">Banco</option>
            </select>
            <input type="text" id="financiamentoInfo" style="flex: 1.5;" oninput="atualizarPreview()">
          </div>
          <input type="text" id="dataContrato" oninput="onInputData(event)">
        </div>
      </div>

      <div class="field-group">
        <label>Restrições</label>
        <label class="checkbox-wrap" style="margin-bottom:10px;">
          <input type="checkbox" id="temRenajud" onchange="atualizarPreview()"> Possui
        </label>
        <div id="renajudContainer" style="display: none; width: 100%;"></div>
        <button id="btnMaisRenajud" class="plus-button" type="button" onclick="adicionarRenajud()" style="display: none;">+</button>
      </div>

      <div class="field-group">
        <label>Venda</label>
        <div style="display: flex; gap: 20px; margin-bottom: 10px;">
          <label class="checkbox-wrap"><input type="checkbox" id="temIntencao" onchange="atualizarPreview()"> Intenção</label>
          <label class="checkbox-wrap"><input type="checkbox" id="temComunicacao" onchange="atualizarPreview()"> Comunicação</label>
        </div>
        <input type="text" id="nomeIntencao" oninput="onInputCapitalize(event)" style="display: none; margin-bottom: 8px;">
        <input type="text" id="dataInclusaoIntencao" style="display: none;" oninput="onInputData(event)">
      </div>

      <div class="field-group">
        <label>Observações</label>
        <label class="checkbox-wrap" style="margin-bottom:10px;">
          <input type="checkbox" id="temObservacao" onchange="atualizarPreview()"> Adicionar
        </label>
        <div id="observacoesContainer" style="display: none; width: 100%; flex-direction: column;"></div>
        <button id="btnMaisObs" class="plus-button" type="button" onclick="adicionarObservacao()" style="none;">+</button>
      </div>

      <div class="field-group">
        <label>Débitos</label>
        
        <div style="display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap;">
          <label class="checkbox-wrap">
            <input type="checkbox" id="dia25" onchange="atualizarPreview()"> Em dia 25
          </label>
          <label class="checkbox-wrap">
            <input type="checkbox" id="dia26" onchange="atualizarPreview()"> Em dia 26
          </label>
          <label class="checkbox-wrap">
            <input type="checkbox" id="ipvaLic" onchange="toggleIpvaLic()"> IPVA + LIC.
          </label>
        </div>

        <div id="debitosContainer"></div>
        
        <div style="display: flex; gap: 8px;">
            <button class="plus-button" type="button" onclick="adicionarDebito()">+</button>
        </div>
      </div>

      <div class="field-group">
        <label>Valor Obrigatório</label>
        <label class="checkbox-wrap" style="margin-bottom:10px;">
          <input type="checkbox" id="temValorObrigatorio" onchange="atualizarPreview()"> Adicionar
        </label>
        <input type="text" id="debitoValorObrigatorio" oninput="atualizarPreview()" style="display: none;">
      </div>

      <div class="field-group">
        <label>Valor total</label>
        <input type="text" id="debitoValor" oninput="atualizarPreview()">
      </div>

      <div class="field-group">
        <label>Multas em autuação</label>
        <label class="checkbox-wrap" style="margin-bottom:10px;">
          <input type="checkbox" id="temMultasAutuac" onchange="atualizarPreview()"> Possui
        </label>
        <div id="multasAutuacCampos" style="display: none; gap: 6px;">
          <input type="text" id="quantidadeMultas" style="flex: 0.5;" oninput="atualizarPreview()">
          <input type="text" id="valorMultas" style="flex: 1.5;" oninput="atualizarPreview()">
        </div>
      </div>

      <div class="field-group">
        <label>Multas recorridas</label>
        <label class="checkbox-wrap" style="margin-bottom:10px;">
          <input type="checkbox" id="temMultasRecor" onchange="atualizarPreview()"> Possui
        </label>
        <div id="multasRecorCampos" style="display: none; gap: 6px;">
          <input type="text" id="quantidadeMultasRecor" style="flex: 0.5;" oninput="atualizarPreview()">
          <input type="text" id="valorMultasRecor" style="flex: 1.5;" oninput="atualizarPreview()">
        </div>
      </div>

      <div class="field-group" style="border-bottom: none;">
        <label>Informações Desatualizadas</label>
        <div style="display: flex; gap: 15px;">
          <label class="checkbox-wrap"><input type="checkbox" id="temAvisoSP" onchange="atualizarPreview()"> SP</label>
          <label class="checkbox-wrap"><input type="checkbox" id="temAvisoRS" onchange="atualizarPreview()"> RS</label>
        </div>
      </div>

      <div class="buttons">
        <button id="btnCopiarMsg" class="btn-copiar" onclick="copiarMensagem()">Copiar</button>
        <button class="btn-limpar" onclick="limparCampos()">Limpar</button>
      </div>
    </div>
  </div>

  <div class="preview-container">
    <div class="whatsapp-message" id="previewMsg" contenteditable="true"></div>
  </div>

  <script>
    const f = (id) => document.getElementById(id).value;
    const v = (id) => document.getElementById(id).checked;

    document.addEventListener('input', (e) => {
      if (e.target.tagName === 'INPUT' && (e.target.type === 'text' || e.target.type === 'number') && e.target.id !== 'modeloAno') {
        if (e.target.value.startsWith(' ')) {
          e.target.value = e.target.value.trimStart();
        }
      }
    });

    document.addEventListener('focusout', (e) => {
      if (e.target.tagName === 'INPUT' && (e.target.type === 'text' || e.target.type === 'number') && e.target.id !== 'modeloAno') {
        if (e.target.value !== e.target.value.trim()) {
          e.target.value = e.target.value.trim();
          atualizarPreview();
        }
      }
    });

    const UF_NOMES = {
      'AC':'Acre','AL':'Alagoas','AP':'Amapá','AM':'Amazonas','BA':'Bahia','CE':'Ceará','DF':'Distrito Federal','ES':'Espírito Santo','GO':'Goiás','MA':'Maranhão','MT':'Mato Grosso','MS':'Mato Grosso do Sul','MG':'Minas Gerais','PA':'Pará','PB':'Paraíba','PR':'Paraná','PE':'Pernambuco','PI':'Piauí','RJ':'Rio de Janeiro','RN':'Rio Grande do Norte','RS':'Rio Grande do Sul','RO':'Rondônia','RR':'Roraima','SP':'São Paulo','SE':'Sergipe','TO':'Tocantins'
    };

    const BANCOS = ["Ailos","Aymoré","Bradesco","C6","Creditas","Cresol","Daycoval","Digimais","do Brasil","HS Consórcios","Itaucard","Omni","PAN","Safra","Sicoob","Sicredi","Volkswagen","Votorantim"].sort();
    
    const MARCAS = ["Audi", "BMW", "BYD", "Chana", "Chery", "Chevrolet", "Citroën", "Dafra", "Effa", "Fiat", "Ford", "GWM", "Honda", "Hyundai", "Iveco", "JAC", "Jaguar", "Jeep", "Kawasaki", "Kia", "Land Rover", "Mahindra", "Mercedes-Benz", "Mitsubishi", "Nissan", "Peugeot", "Ram", "Reboque", "Renault", "Scania", "Shineray", "Ssangyong", "Sundown", "Suzuki", "Toyota", "Volkswagen", "Volvo", "Yamaha"].sort();

    const RENAJUD_OPCOES = [
      {val:"transferência",label:"RENAJUD de Transferência"},
      {val:"licenciamento",label:"RENAJUD de Licenciamento"},
      {val:"circulação",label:"RENAJUD de Circulação"},
      {val:"penhora",label:"RENAJUD de Penhora"},
      {val:"execucao-certidao",label:"Execução por certidão"},
      {val:"administrativa",label:"Administrativa"},
      {val:"averbacao",label:"Averbação"}
    ];

    function onInputPlaca(e) { 
      e.target.value = e.target.value.toUpperCase(); 
      atualizarPreview(); 
    }
    
    function onInputData(e) {
      let val = e.target.value.replace(/\D/g, '').substring(0, 8);
      if (val.length >= 5) val = `${val.substring(0,2)}/${val.substring(2,4)}/${val.substring(4)}`;
      else if (val.length >= 3) val = `${val.substring(0,2)}/${val.substring(2)}`;
      e.target.value = val; 
      atualizarPreview();
    }

    function formatarProprietario(str, isSimple = false) {
      const dWords = ['de', 'da', 'do', 'das', 'dos'];
      let texto = str.toLowerCase()
                     .replace(/(?:^|\s|[.])[a-zà-ú]/g, m => m.toUpperCase())
                     .replace(/\b([Dd][aeo]s?)\b/g, m => dWords.includes(m.toLowerCase()) ? m.toLowerCase() : m);
      
      if (isSimple) return texto;
      return texto.replace(/\bltda\b/gi, 'LTDA').replace(/\bme\b/gi, 'ME').replace(/\bE\b/g, 'e');
    }

    function onInputCapitalize(e) {
      const start = e.target.selectionStart;
      const isSimple = e.target.id === 'emplacadoEm';
      const newValue = formatarProprietario(e.target.value, isSimple);
      
      if (e.target.value !== newValue) { 
        e.target.value = newValue; 
        e.target.setSelectionRange(start, start); 
      }
      atualizarPreview();
    }

    function toggleIpvaLic() {
      const inputs = document.querySelectorAll('.descricaoDebito');
      const isChecked = document.getElementById('ipvaLic').checked;
      
      if (isChecked) {
        if (inputs.length < 1) adicionarDebito();
        if (inputs.length < 2) adicionarDebito();
        
        const updatedInputs = document.querySelectorAll('.descricaoDebito');
        updatedInputs[0].value = "Licenciamento 2026";
        updatedInputs[1].value = "IPVA 2026";
      } else {
        if (inputs[0] && inputs[0].value === "Licenciamento 2026") inputs[0].value = "";
        if (inputs[1] && inputs[1].value === "IPVA 2026") inputs[1].value = "";
      }
      atualizarPreview();
    }

    function popularDropdowns() {
      const selAnterior = document.getElementById('emplacadoAnterior');
      const selMunicipio = document.getElementById('municipioEstado');
      
      if (selAnterior.options.length <= 1) {
        Object.keys(UF_NOMES).sort().forEach(sigla => {
          if (sigla !== 'SC') {
            selAnterior.add(new Option(sigla, sigla));
            selMunicipio.add(new Option(sigla, sigla));
          }
        });
      }

      const selBanco = document.getElementById('financiamentoSelect');
      if (selBanco.options.length <= 1) {
        BANCOS.forEach(banco => {
          let display = banco === "do Brasil" ? "Banco do Brasil" : banco;
          selBanco.add(new Option(display, banco));
        });
      }

      const selMarca = document.getElementById('marca');
      if (selMarca && selMarca.options.length <= 1) {
        MARCAS.forEach(marca => {
          selMarca.add(new Option(marca, marca));
        });
      }
    }

    function adicionarDebito() {
      const container = document.getElementById('debitosContainer');
      const inline = document.createElement('div'); 
      inline.className = 'row-item';

      const input = document.createElement('input'); 
      input.type = 'text'; 
      input.className = 'descricaoDebito'; 
      input.addEventListener('input', atualizarPreview);
      inline.appendChild(input);
      container.appendChild(inline);
    }

    function adicionarObservacao() {
      const input = document.createElement('input'); 
      input.type = 'text'; 
      input.className = 'textoObservacao'; 
      input.style.marginBottom = '8px'; 
      input.addEventListener('input', atualizarPreview);
      document.getElementById('observacoesContainer').appendChild(input);
    }

    function adicionarRenajud() {
      const div = document.createElement('div');
      div.className = 'renajud-item';
      div.style.display = 'flex';
      div.style.gap = '6px';
      div.style.marginBottom = '8px';

      const sel = document.createElement('select'); 
      sel.className = 'selRenajud'; 
      sel.style.flex = '1';
      sel.addEventListener('change', atualizarPreview);
      RENAJUD_OPCOES.forEach(optData => {
        sel.add(new Option(optData.label, optData.val));
      });

      const qtd = document.createElement('input');
      qtd.type = 'number';
      qtd.className = 'qtdRenajud';
      qtd.min = '1';
      qtd.value = '1';
      qtd.style.width = '60px';
      qtd.addEventListener('input', atualizarPreview);

      div.appendChild(sel);
      div.appendChild(qtd);
      document.getElementById('renajudContainer').appendChild(div);
      atualizarPreview();
    }

    function formatarValorParaString(num) {
      return 'R$' + num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function getFloatDeString(str) {
      return parseFloat(str.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
    }

    function gerarTextoMensagem() {
      const placa = f('placa'), marca = f('marca'), modeloAno = f('modeloAno');
      const mun = f('emplacadoEm'), ufMun = f('municipioEstado');
      const empAnt = v('temAnterior') ? f('emplacadoAnterior') : '';
      const prop = f('proprietario'), propCnpj = v('proprietarioCnpj');
      const finan = v('temFinanciamento') ? f('financiamentoInfo') : '', finanInc = v('financiamentoIncluso'), dataCont = f('dataContrato');
      const temRen = v('temRenajud');
      const valTot = f('debitoValor').includes('R$') ? f('debitoValor') : formatarValorParaString(getFloatDeString(f('debitoValor')));
      const valObrig = f('debitoValorObrigatorio').includes('R$') ? f('debitoValorObrigatorio') : formatarValorParaString(getFloatDeString(f('debitoValorObrigatorio')));
      
      const d25 = v('dia25'), d26 = v('dia26');
      const temInt = v('temIntencao'), temCom = v('temComunicacao'), nomeInt = f('nomeIntencao'), dataInt = f('dataInclusaoIntencao');
      const avisoSP = v('temAvisoSP'), avisoRS = v('temAvisoRS');

      let msg = `🚗 *DADOS DO VEÍCULO*\n`;
      if (placa) msg += `• *Placa:* ${placa}\n`;
      let modeloStr = `${marca} ${modeloAno}`.trim();
      if (modeloStr) msg += `• *Modelo:* ${modeloStr}\n`;
      if (prop) msg += `• *Proprietário:* ${prop}${propCnpj ? ' (CNPJ)' : ''}\n`;
      
      if (mun) {
        let localidade = mun;
        if (ufMun) localidade += ` - ${ufMun}`;
        msg += `• *Município:* ${localidade}${empAnt ? ` (Procedência anterior: ${UF_NOMES[empAnt] || empAnt})` : ''}\n`;
      }

      msg += `\n⚠️ *RESTRIÇÕES E PENDÊNCIAS*\n`;
      let statusFinan = finanInc ? "a ser incluído" : "ativo";
      let bancoFinal = (finan === "do Brasil") ? `(*Banco do Brasil*${dataCont ? ', contrato de ' + dataCont : ''})` : `(Banco *${finan}*${dataCont ? ', contrato de ' + dataCont : ''})`;
      msg += `• *Alienação:* ${finan ? `Possui financiamento ${statusFinan} ${bancoFinal}` : "Não possui"}\n`;

      const needsEmoji = ["transferência", "licenciamento", "circulação", "penhora", "administrativa"];
      let renList = Array.from(document.querySelectorAll('.renajud-item')).map(div => {
        let s = div.querySelector('.selRenajud');
        let q = div.querySelector('.qtdRenajud');
        let val = s.value;
        let qtd = parseInt(q.value) || 1;
        let label = RENAJUD_OPCOES.find(o => o.val === val).label.toLowerCase();
        let desc = label;
        if (["transferência", "licenciamento", "circulação", "penhora"].includes(val)) {
          desc = qtd > 1 ? `${qtd} bloqueios RENAJUD de ${val}` : `bloqueio RENAJUD de ${val}`;
        } else if (val === "execucao-certidao") {
          desc = qtd > 1 ? `${qtd} restrições de execução por certidão` : "restrição de execução por certidão";
        } else if (val === "administrativa") {
          desc = qtd > 1 ? `${qtd} restrições administrativas` : "restrição administrativa";
        } else if (val === "averbacao") {
          desc = qtd > 1 ? `${qtd} averbações de execução por certidão` : "averbação de execução por certidão";
        }
        return { desc: desc, val: val };
      });

      if (!temRen || renList.length === 0) {
        msg += `• *Restrição:* Não possui\n`;
      } else if (renList.length === 1) {
        let item = renList[0];
        let emoji = needsEmoji.includes(item.val) ? " 🚫" : "";
        msg += `• *Restrição:* Possui ${item.desc.charAt(0).toLowerCase() + item.desc.slice(1)}${emoji}\n`;
      } else {
        msg += `• *Restrição:* Possui:\n`;
        renList.forEach((item) => {
          let emoji = needsEmoji.includes(item.val) ? " 🚫" : "";
          msg += `• ${item.desc.charAt(0).toUpperCase() + item.desc.slice(1)}${emoji}\n`;
        });
      }

      if ((temInt || temCom) && nomeInt) {
        let prefixo = (temInt && temCom) ? "Intenção e comunicação de venda registrada" : (temInt ? "Intenção de venda registrada" : "Comunicação de venda registrada");
        msg += `• *Venda:* ${prefixo} para ${nomeInt}${dataInt ? ` em ${dataInt}` : ''}\n`;
      } else {
        msg += `• *Venda:* Não possui\n`;
      }

      const obsArr = Array.from(document.querySelectorAll('.textoObservacao')).map(i => i.value.trim()).filter(v => v);
      if (v('temObservacao') && obsArr.length > 0) {
        msg += `\n🔍 *OBSERVAÇÕES*\n`;
        obsArr.forEach(o => msg += `• ${o}\n`);
      }

      msg += `\n💰 *DÉBITOS*\n`;
      if (d25) msg += `• Veículo em dia (2025)\n`;
      if (d26) msg += `• Veículo em dia (2026)\n`;

      const debs = Array.from(document.querySelectorAll('.descricaoDebito')).map(i => i.value.trim()).filter(v => v);
      if (debs.length > 0) {
        debs.forEach((d, i) => msg += `• ${d}${i === debs.length - 1 ? ' =' : ' +'}\n`);
        if (v('temValorObrigatorio') && getFloatDeString(f('debitoValorObrigatorio')) > 0) msg += `• *VALOR OBRIGATÓRIO:* ${valObrig}\n`;
        if (getFloatDeString(f('debitoValor')) > 0) msg += `• *VALOR TOTAL:* ${valTot}\n`;
      } else if (!d25 && !d26) {
        msg += `• Sem débitos, veículo em dia (2026)\n`;
        if (v('temValorObrigatorio') && getFloatDeString(f('debitoValorObrigatorio')) > 0) msg += `• *VALOR OBRIGATÓRIO:* ${valObrig}\n`;
        if (getFloatDeString(f('debitoValor')) > 0) msg += `• *VALOR TOTAL:* ${valTot}\n`;
      }

      if (v('temMultasAutuac')) {
        const qtdMul = parseInt(f('quantidadeMultas') || '0');
        const valMul = formatarValorParaString(getFloatDeString(f('valorMultas')));
        if (qtdMul > 0) {
          msg += `• ${qtdMul === 1 ? '1 multa que ainda não caiu no sistema' : `${qtdMul} multas que ainda não caíram no sistema`}${getFloatDeString(f('valorMultas')) > 0 ? ` (valor total de ${valMul})` : ''}\n`;
        }
      }

      if (v('temMultasRecor')) {
        const qtdMulRecor = parseInt(f('quantidadeMultasRecor') || '0');
        const valMulRecor = formatarValorParaString(getFloatDeString(f('valorMultasRecor')));
        if (qtdMulRecor > 0) {
          msg += `• ${qtdMulRecor === 1 ? '1 multa sendo recorrida' : `${qtdMulRecor} multas sendo recorridas`}${getFloatDeString(f('valorMultasRecor')) > 0 ? ` (valor total de ${valMulRecor})` : ''}\n`;
        }
      }
      
      if (avisoSP) msg += `\n⚠️ *O Detran de SP pode conter informações desatualizadas*`;
      if (avisoRS) msg += `\n⚠️ *O Detran do RS pode conter informações desatualizadas*`;

      return msg.trim();
    }

    function atualizarPreview() {
      if (document.activeElement.id === 'previewMsg') return;

      const m = gerarTextoMensagem();
      document.getElementById('previewMsg').innerHTML = m.replace(/\*([^\*]+)\*/g, '<b>$1</b>');
      
      document.getElementById('emplacadoAnterior').style.display = v('temAnterior') ? 'block' : 'none';
      document.getElementById('financiamentoCampos').style.display = v('temFinanciamento') ? 'flex' : 'none';
      
      const vVenda = v('temIntencao') || v('temComunicacao');
      document.getElementById('nomeIntencao').style.display = vVenda ? 'block' : 'none';
      document.getElementById('dataInclusaoIntencao').style.display = vVenda ? 'block' : 'none';
      
      document.getElementById('observacoesContainer').style.display = v('temObservacao') ? 'flex' : 'none';
      document.getElementById('btnMaisObs').style.display = v('temObservacao') ? 'flex' : 'none';
      document.getElementById('renajudContainer').style.display = v('temRenajud') ? 'block' : 'none';
      document.getElementById('btnMaisRenajud').style.display = v('temRenajud') ? 'block' : 'none';

      document.getElementById('debitoValorObrigatorio').style.display = v('temValorObrigatorio') ? 'block' : 'none';

      document.getElementById('multasAutuacCampos').style.display = v('temMultasAutuac') ? 'flex' : 'none';
      document.getElementById('multasRecorCampos').style.display = v('temMultasRecor') ? 'flex' : 'none';
    }

    function copiarMensagem() { 
      const preview = document.getElementById('previewMsg');
      let text = preview.innerHTML;
      text = text.replace(/<b[^>]*>([\s\S]*?)<\/b>/gi, '*$1*');
      text = text.replace(/<div[^>]*>([\s\S]*?)<\/div>/gi, '\n$1');
      text = text.replace(/<br\s*\/?>/gi, '\n');
      const temp = document.createElement('div');
      temp.innerHTML = text;
      
      navigator.clipboard.writeText(temp.innerText.trim()).then(() => {
        const btn = document.getElementById('btnCopiarMsg');
        btn.classList.add('success');
        btn.innerText = '✓ Copiado!';
        setTimeout(() => {
          btn.classList.remove('success');
          btn.innerText = 'Copiar';
        }, 1500);
      }); 
    }

    function limparCampos() {
      document.querySelectorAll('input[type="text"]').forEach(i => i.value = '');
      document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
      document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
      document.getElementById('debitosContainer').innerHTML = '';
      document.getElementById('observacoesContainer').innerHTML = '';
      document.getElementById('renajudContainer').innerHTML = '';
      for(let i=0; i<3; i++) adicionarDebito();
      adicionarObservacao(); adicionarRenajud(); popularDropdowns(); atualizarPreview();
    }

    window.onload = () => {
      popularDropdowns();
      for(let i=0; i<3; i++) adicionarDebito();
      adicionarObservacao(); adicionarRenajud();
      
      document.querySelectorAll('input[type="text"]').forEach(i => {
        const ignore = ['placa','marca','modeloAno','financiamentoInfo','debitoValor','debitoValorObrigatorio','dataInclusaoIntencao','dataContrato','emplacadoEm','proprietario','nomeIntencao','quantidadeMultas','valorMultas','quantidadeMultasRecor','valorMultasRecor'];
        if (!ignore.includes(i.id)) {
          i.addEventListener('input', (e) => {
            e.target.value = e.target.value.charAt(0).toUpperCase() + e.target.value.slice(1);
            atualizarPreview();
          });
        }
      });
      atualizarPreview();
    };
  </script>
</body>
</html>

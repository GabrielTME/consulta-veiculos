<html lang="pt-BR">
<head>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Helvetica', 'Arial', sans-serif; display: flex; height: 100vh; min-height: 0; background: #161717; }
    
    .form-container { 
      background: #2D2D2D; 
      color: #FFFFFF; 
      border-right: 1px solid #3d3d3d; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      flex: 1 1 0; 
      overflow-y: auto; 
      padding: 30px 20px;
      font-family: 'Inter', sans-serif;
    }

    .form-container > div { max-width: 400px; width: 100%; }

    .field-group { 
      margin-bottom: 18px; 
      border-bottom: 1px solid #444; 
      padding-bottom: 14px; 
    }
    
    label { 
      display: block; 
      font-weight: 700; 
      margin-bottom: 8px; 
      color: #FFFFFF; 
      font-size: 12px; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
    }
    
    input[type="text"], select { 
      width: 100%; 
      padding: 12px; 
      border-radius: 6px; 
      border: 1px solid #444; 
      background: #151515; 
      color: #FFFFFF; 
      font-size: 14px; 
      transition: border-color 0.3s;
      font-family: 'Inter', sans-serif; 
      font-weight: 400; 
      outline: none;
      display: block;
    }

    input[type="text"]:focus, select:focus { border-color: #7FDB5C; }

    .buttons { display: flex; gap: 12px; margin-top: 25px; }
    .calc-buttons { display: flex; gap: 8px; margin-top: 8px; }

    button { 
      padding: 12px; 
      border-radius: 6px; 
      border: none; 
      font-weight: 700; 
      cursor: pointer; 
      font-family: 'Inter', sans-serif; 
      transition: transform 0.1s; 
    }

    button:active { transform: scale(0.97); }
    
    .btn-copiar, .plus-button, .btn-calc, .btn-shortcut { 
      background: #7FDB5C; 
      color: #000000; 
    }

    .btn-copiar:hover, .btn-calc:hover, .btn-shortcut:hover { background: #96e678; }
    
    .btn-limpar { background: #3F3F3F; color: #FFFFFF; flex: 1; }
    .btn-copiar { flex: 1; }
    .btn-calc { font-size: 11px; padding: 8px; flex: 1; }

    .plus-button { 
      width: 34px; height: 34px; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 24px; 
      line-height: 0; 
      padding: 0; 
      margin-top: 8px; 
      border-radius: 6px; 
    }

    .btn-shortcut { 
      height: 34px; 
      padding: 0 12px; 
      font-size: 11px; 
      margin-top: 8px; 
      border-radius: 6px; 
    }

    .checkbox-wrap { 
      display: flex; 
      align-items: center; 
      gap: 6px; 
      font-size: 12px; 
      color: #B5B5B5; 
      cursor: pointer; 
      margin-top: 5px; 
      font-weight: 700; 
    }

    input[type="checkbox"] { accent-color: #7FDB5C; width: 16px; height: 16px; cursor: pointer; }

    .preview-container { background: #161717; display: flex; align-items: center; justify-content: center; flex: 1 1 0; }
    .whatsapp-message { 
      background: #144D37; 
      color: #e9edef; 
      border-radius: 7.5px; 
      padding: 14px 18px; 
      max-width: 600px; 
      font-size: 18px; 
      line-height: 1.5; 
      white-space: pre-wrap; 
    }
    #previewMsg b { font-weight: bold; }
    
    .row-item { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; width: 100%; }
    .row-item input, .row-item select { flex: 1; }
  </style>
</head>
<body>
  <div class="form-container">
    <div>
      <div class="field-group">
        <label>Veículo</label>
        <div style="display: flex; gap: 6px;">
          <input type="text" id="marca" oninput="atualizarPreview()">
          <input type="text" id="modelo" oninput="atualizarPreview()">
          <input type="text" id="ano" oninput="atualizarPreview()">
        </div>
      </div>

      <div class="field-group">
        <label>Proprietário</label>
        <input type="text" id="proprietario" oninput="atualizarPreview()">
        <label class="checkbox-wrap">
          <input type="checkbox" id="proprietarioCnpj" onchange="atualizarPreview()"> CNPJ
        </label>
      </div>

      <div class="field-group">
        <label>Município / Procedência</label>
        <div style="display: flex; gap: 6px; margin-bottom: 8px;">
          <input type="text" id="emplacadoEm" oninput="atualizarPreview()" style="flex: 2.5;">
          <select id="municipioEstado" onchange="atualizarPreview()" style="flex: 1;">
            <option value="">UF</option>
          </select>
        </div>
        <label class="checkbox-wrap">
          <input type="checkbox" id="temAnterior" onchange="atualizarPreview()"> Procedência anterior
        </label>
        <select id="emplacadoAnterior" style="display: none; margin-top:8px;" onchange="atualizarPreview()">
            <option value="">Selecione o estado</option>
        </select>
      </div>

      <div class="field-group">
        <label>Financiamento</label>
        <div style="display: flex; gap: 15px; margin-bottom: 10px;">
          <label class="checkbox-wrap"><input type="checkbox" id="temFinanciamento" onchange="atualizarPreview()"> Possui</label>
          <label class="checkbox-wrap"><input type="checkbox" id="financiamentoIncluso" onchange="atualizarPreview()"> A incluir</label>
        </div>
        <div id="financiamentoCampos" style="display: none; flex-direction: column; gap: 8px; width: 100%;">
          <div style="display: flex; gap: 6px; width: 100%;">
            <select id="financiamentoSelect" onchange="document.getElementById('financiamentoInfo').value = this.value; atualizarPreview();" style="flex: 1;">
              <option value="">Banco</option>
            </select>
            <input type="text" id="financiamentoInfo" style="flex: 1.5;" oninput="atualizarPreview()">
          </div>
          <input type="text" id="dataContrato" oninput="atualizarPreview()">
        </div>
      </div>

      <div class="field-group">
        <label>Restrição Judicial / Adm.</label>
        <label class="checkbox-wrap" style="margin-bottom:10px;">
          <input type="checkbox" id="temRenajud" onchange="atualizarPreview()"> Possui
        </label>
        <div id="renajudContainer" style="display: none; width: 100%;"></div>
        <button id="btnMaisRenajud" class="plus-button" type="button" onclick="adicionarRenajud()" style="display: none;">+</button>
      </div>

      <div class="field-group">
        <label>Venda (Intenção/Comunicação)</label>
        <div style="display: flex; gap: 20px; margin-bottom: 10px;">
          <label class="checkbox-wrap"><input type="checkbox" id="temIntencao" onchange="atualizarPreview()"> Intenção</label>
          <label class="checkbox-wrap"><input type="checkbox" id="temComunicacao" onchange="atualizarPreview()"> Comunic.</label>
        </div>
        <input type="text" id="nomeIntencao" style="display: none; margin-bottom:8px;" oninput="atualizarPreview()">
        <input type="text" id="dataInclusaoIntencao" style="display: none;" oninput="atualizarPreview()">
      </div>

      <div class="field-group">
        <label>Observações</label>
        <label class="checkbox-wrap" style="margin-bottom:10px;">
          <input type="checkbox" id="temObservacao" onchange="atualizarPreview()"> Adicionar
        </label>
        <div id="observacoesContainer" style="display: none; width: 100%; flex-direction: column;"></div>
        <button id="btnMaisObs" class="plus-button" type="button" onclick="adicionarObservacao()" style="display: none;">+</button>
      </div>

      <div class="field-group">
        <label>Débitos</label>
        <div id="debitosContainer"></div>
        <div style="display: flex; gap: 8px;">
            <button class="plus-button" type="button" onclick="adicionarDebito()">+</button>
            <button class="btn-shortcut" type="button" onclick="adicionarTransferenciaVistoria()">+ Transferência</button>
        </div>
      </div>

      <div class="field-group">
        <label>Valor total</label>
        <input type="text" id="debitoValor" oninput="atualizarPreview()">
        <div class="calc-buttons">
          <button class="btn-calc" onclick="ajustarValor(150)">+ R$150,00</button>
          <button class="btn-calc" onclick="ajustarValor(200)">+ R$200,00</button>
        </div>
      </div>

      <div class="field-group">
        <label>Multas para entrar no sistema</label>
        <div style="display: flex; gap: 6px;">
          <input type="text" id="quantidadeMultas" style="flex: 0.5;" oninput="atualizarPreview()">
          <input type="text" id="valorMultas" style="flex: 1.5;" oninput="atualizarPreview()">
        </div>
      </div>

      <div class="field-group" style="border-bottom: none;">
        <label>Informações Desatualizadas</label>
        <div style="display: flex; gap: 15px;">
          <label class="checkbox-wrap"><input type="checkbox" id="temAvisoSP" onchange="atualizarPreview()"> SP</label>
          <label class="checkbox-wrap"><input type="checkbox" id="temAvisoRS" onchange="atualizarPreview()"> RS</label>
        </div>
      </div>

      <div class="buttons">
        <button class="btn-copiar" onclick="copiarMensagem()">Copiar</button>
        <button class="btn-limpar" onclick="limparCampos()">Limpar</button>
      </div>
    </div>
  </div>
  <div class="preview-container"><div class="whatsapp-message" id="previewMsg"></div></div>

  <script>
    const f = (id) => document.getElementById(id).value;
    const v = (id) => document.getElementById(id).checked;

    const UF_NOMES = {
      'AC': 'Acre', 'AL': 'Alagoas', 'AP': 'Amapá', 'AM': 'Amazonas', 'BA': 'Bahia', 'CE': 'Ceará', 'DF': 'Distrito Federal', 'ES': 'Espírito Santo', 'GO': 'Goiás', 'MA': 'Maranhão', 'MT': 'Mato Grosso', 'MS': 'Mato Grosso do Sul', 'MG': 'Minas Gerais', 'PA': 'Pará', 'PB': 'Paraíba', 'PR': 'Paraná', 'PE': 'Pernambuco', 'PI': 'Piauí', 'RJ': 'Rio de Janeiro', 'RN': 'Rio Grande do Norte', 'RS': 'Rio Grande do Sul', 'RO': 'Rondônia', 'RR': 'Roraima', 'SP': 'São Paulo', 'SE': 'Sergipe', 'TO': 'Tocantins'
    };

    const BANCOS = ["Ailos", "Aymoré", "Bradesco", "C6", "Daycoval", "Digimais", "do Brasil", "Itaucard", "PAN", "Sicoob", "Sicredi", "Volkswagen", "Votorantim"].sort();

    const RENAJUD_OPCOES = [
      {val: "transferência", label: "Transferência"},
      {val: "licenciamento", label: "Licenciamento"},
      {val: "circulação", label: "Circulação"},
      {val: "penhora", label: "Penhora"},
      {val: "execucao-certidao", label: "Execução por certidão"},
      {val: "administrativa", label: "Administrativa"},
      {val: "averbacao", label: "Averbação"}
    ];

    function popularDropdowns() {
      const selAnterior = document.getElementById('emplacadoAnterior');
      const selMunicipio = document.getElementById('municipioEstado');
      
      if (selAnterior.options.length <= 1) {
        Object.keys(UF_NOMES).sort().forEach(sigla => {
          if (sigla !== 'SC') {
            selAnterior.add(new Option(sigla, sigla));
            selMunicipio.add(new Option(sigla, sigla));
          }
        });
      }

      const selBanco = document.getElementById('financiamentoSelect');
      if (selBanco.options.length <= 1) {
        BANCOS.forEach(banco => {
          let display = banco === "do Brasil" ? "Banco do Brasil" : banco;
          selBanco.add(new Option(display, banco));
        });
      }
    }

    function formatarValorParaString(num) {
      return 'R$' + num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function getFloatDeString(str) {
      return parseFloat(str.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
    }

    function ajustarValor(soma) {
      let atual = getFloatDeString(f('debitoValor'));
      document.getElementById('debitoValor').value = formatarValorParaString(atual + soma);
      atualizarPreview();
    }

    function capitalizeWords(str) {
      if (!str) return "";
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function formatarProprietario(str) {
      const dWords = ['de', 'da', 'do', 'das', 'dos'];
      let texto = str.toLowerCase().replace(/(?:^|\s|[.])[a-zà-ú]/g, m => m.toUpperCase())
                    .replace(/\b([Dd][aeo]s?)\b/g, m => dWords.includes(m.toLowerCase()) ? m.toLowerCase() : m);
      return texto.replace(/\bltda\b/gi, 'LTDA').replace(/\bme\b/gi, 'ME').replace(/\bE\b/g, 'e');
    }

    function onInputCapitalize(e) {
      const start = e.target.selectionStart;
      const newValue = (e.target.id === 'proprietario') ? formatarProprietario(e.target.value) : capitalizeWords(e.target.value);
      if (e.target.value !== newValue) { 
        e.target.value = newValue; 
        e.target.setSelectionRange(start, start); 
      }
    }

    function adicionarDebito() {
      const container = document.getElementById('debitosContainer');
      const count = container.querySelectorAll('.row-item').length;
      const linha = document.createElement('div'); 
      linha.className = 'row-item';

      const input = document.createElement('input'); 
      input.type = 'text'; 
      input.className = 'descricaoDebito'; 
      input.addEventListener('input', atualizarPreview);
      linha.appendChild(input);

      if (count === 0) {
        const wrap = document.createElement('div'); 
        wrap.style.display = 'flex'; 
        wrap.style.flexDirection = 'column'; 
        wrap.style.gap = '2px';
        wrap.innerHTML = `
          <label class="checkbox-wrap"><input type="checkbox" id="dia25" onchange="atualizarPreview()"> Em dia 25</label>
          <label class="checkbox-wrap"><input type="checkbox" id="dia26" onchange="atualizarPreview()"> Em dia 26</label>
        `;
        linha.appendChild(wrap);
      }
      container.appendChild(linha);
    }

    function adicionarTransferenciaVistoria() {
      const container = document.getElementById('debitosContainer');
      ["Transferência", "Vistoria"].forEach(texto => {
        const linha = document.createElement('div'); 
        linha.className = 'row-item';
        const input = document.createElement('input'); 
        input.type = 'text'; 
        input.className = 'descricaoDebito'; 
        input.value = texto;
        input.addEventListener('input', atualizarPreview);
        linha.appendChild(input);
        container.appendChild(linha);
      });
      atualizarPreview();
    }

    function adicionarObservacao() {
      const input = document.createElement('input'); 
      input.type = 'text'; 
      input.className = 'textoObservacao'; 
      input.style.marginBottom = '8px'; 
      input.addEventListener('input', atualizarPreview);
      document.getElementById('observacoesContainer').appendChild(input);
    }

    function adicionarRenajud() {
      const sel = document.createElement('select'); 
      sel.className = 'selRenajud'; 
      sel.style.marginBottom = '8px';
      sel.addEventListener('change', atualizarPreview);
      RENAJUD_OPCOES.forEach(optData => {
        sel.add(new Option(optData.label, optData.val));
      });
      document.getElementById('renajudContainer').appendChild(sel);
      atualizarPreview();
    }

    function gerarTextoMensagem() {
      const marca = f('marca'), modelo = f('modelo'), ano = f('ano');
      const mun = f('emplacadoEm'), ufMun = f('municipioEstado');
      const empAnt = v('temAnterior') ? f('emplacadoAnterior') : '';
      const prop = formatarProprietario(f('proprietario')), propCnpj = v('proprietarioCnpj');
      const finan = v('temFinanciamento') ? f('financiamentoInfo') : '', finanInc = v('financiamentoIncluso'), dataCont = f('dataContrato');
      const temRen = v('temRenajud');
      const valTot = f('debitoValor').includes('R$') ? f('debitoValor') : formatarValorParaString(getFloatDeString(f('debitoValor')));
      const d25 = document.getElementById('dia25')?.checked, d26 = document.getElementById('dia26')?.checked;
      const temInt = v('temIntencao'), temCom = v('temComunicacao'), nomeInt = formatarProprietario(f('nomeIntencao')), dataInt = f('dataInclusaoIntencao');
      const avisoSP = v('temAvisoSP'), avisoRS = v('temAvisoRS');

      let msg = `🚗 *DADOS DO VEÍCULO*\n`;
      if (marca || modelo || ano) msg += `• *Modelo:* ${marca} ${modelo} ${ano}\n`;
      if (prop) msg += `• *Proprietário:* ${prop}${propCnpj ? ' (CNPJ)' : ''}\n`;
      
      // LOGICA CIDADE - ESTADO
      if (mun) {
        let localidade = mun;
        if (ufMun) localidade += ` - ${UF_NOMES[ufMun]}`;
        msg += `• *Município:* ${localidade}${empAnt ? ` (Procedência anterior: ${UF_NOMES[empAnt]})` : ''}\n`;
      }

      msg += `\n⚠️ *RESTRIÇÕES E PENDÊNCIAS*\n`;
      let statusFinan = finanInc ? "a ser incluído" : "ativo";
      let bancoFinal = (finan === "do Brasil") ? `(*Banco do Brasil*${dataCont ? ', contrato de ' + dataCont : ''})` : `(Banco *${finan}*${dataCont ? ', contrato de ' + dataCont : ''})`;
      msg += `• *Alienação:* ${finan ? `Possui financiamento ${statusFinan} ${bancoFinal}` : "Não possui"}\n`;

      let renList = Array.from(document.querySelectorAll('.selRenajud')).map(s => {
        let val = s.value;
        let label = RENAJUD_OPCOES.find(o => o.val === val).label.toLowerCase();
        if (["transferência", "licenciamento", "circulação", "penhora"].includes(val)) return `bloqueio RENAJUD de ${label}`;
        if (val === "execucao-certidao") return "restrição de execução por certidão";
        if (val === "administrativa") return "restrição administrativa";
        if (val === "averbacao") return "averbação de execução por certidão";
        return label;
      });

      if (!temRen || renList.length === 0) {
        msg += `• *Restrição Judicial:* Não possui\n`;
      } else if (renList.length === 1) {
        msg += `• *Restrição Judicial:* Possui ${capitalizeWords(renList[0])} 🚫\n`;
      } else {
        msg += `• *Restrição Judicial:* Possui:\n`;
        renList.forEach((item, index) => {
          msg += `• ${capitalizeWords(item)}${index === renList.length - 1 ? ' 🚫' : ''}\n`;
        });
      }

      let txtVenda = "Não possui";
      if ((temInt || temCom) && nomeInt) {
        let prefixo = (temInt && temCom) ? "Intenção e comunicação de venda registrada" : (temInt ? "Intenção de venda registrada" : "Comunicação de venda registrada");
        txtVenda = `${prefixo} para ${nomeInt}${dataInt ? ` em ${dataInt}` : ''}`;
      }
      msg += `• *Venda:* ${txtVenda}\n`;

      const obsArr = Array.from(document.querySelectorAll('.textoObservacao')).map(i => i.value.trim()).filter(v => v);
      if (v('temObservacao') && obsArr.length > 0) {
        msg += `\n🔍 *OBSERVAÇÕES*\n`;
        obsArr.forEach(o => msg += `• ${o}\n`);
      }

      msg += `\n💰 *DÉBITOS*\n`;
      if (d25) msg += `• Veículo em dia (2025)\n`;
      if (d26) msg += `• Veículo em dia (2026)\n`;

      const debs = Array.from(document.querySelectorAll('.descricaoDebito')).map(i => i.value.trim()).filter(v => v);
      if (debs.length > 0) {
        debs.forEach((d, i) => msg += `• ${d}${i === debs.length - 1 ? ' =' : ' +'}\n`);
        if (getFloatDeString(f('debitoValor')) > 0) msg += `• *VALOR TOTAL:* ${valTot}\n`;
      } else if (!d25 && !d26) {
        msg += `• Sem débitos, veículo em dia (2026)\n`;
      }

      const qtdMul = parseInt(f('quantidadeMultas') || '0');
      const valMul = formatarValorParaString(getFloatDeString(f('valorMultas')));
      if (qtdMul > 0) {
        msg += `\n• ${qtdMul === 1 ? '1 multa que ainda não caiu no sistema' : `${qtdMul} multas que ainda não caíram no sistema`}${getFloatDeString(f('valorMultas')) > 0 ? ` (valor total de ${valMul})` : ''}\n`;
      }
      
      if (avisoSP) msg += `\n⚠️ *O Detran de SP pode conter informações desatualizadas*`;
      if (avisoRS) msg += `\n⚠️ *O Detran do RS pode conter informações desatualizadas*`;

      return msg.trim();
    }

    function atualizarPreview() {
      const m = gerarTextoMensagem();
      document.getElementById('previewMsg').innerHTML = m.replace(/\*([^\*]+)\*/g, '<b>$1</b>');
      document.getElementById('emplacadoAnterior').style.display = v('temAnterior') ? 'block' : 'none';
      document.getElementById('financiamentoCampos').style.display = v('temFinanciamento') ? 'flex' : 'none';
      document.getElementById('nomeIntencao').style.display = document.getElementById('dataInclusaoIntencao').style.display = (v('temIntencao') || v('temComunicacao')) ? 'block' : 'none';
      document.getElementById('observacoesContainer').style.display = v('temObservacao') ? 'flex' : 'none';
      document.getElementById('btnMaisObs').style.display = v('temObservacao') ? 'flex' : 'none';
      document.getElementById('renajudContainer').style.display = v('temRenajud') ? 'block' : 'none';
      document.getElementById('btnMaisRenajud').style.display = v('temRenajud') ? 'block' : 'none';
    }

    function copiarMensagem() { 
      navigator.clipboard.writeText(gerarTextoMensagem()).then(() => alert('✅')); 
    }

    function limparCampos() {
      document.querySelectorAll('input[type="text"]').forEach(i => i.value = '');
      document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
      document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
      document.getElementById('debitosContainer').innerHTML = '';
      document.getElementById('observacoesContainer').innerHTML = '';
      document.getElementById('renajudContainer').innerHTML = '';
      for(let i=0; i<3; i++) adicionarDebito();
      adicionarObservacao(); adicionarRenajud(); popularDropdowns(); atualizarPreview();
    }

    window.onload = () => {
      popularDropdowns();
      for(let i=0; i<3; i++) adicionarDebito();
      adicionarObservacao(); adicionarRenajud();
      document.querySelectorAll('input[type="text"]').forEach(i => {
        if (!['marca','modelo','financiamentoInfo','emplacadoEm','debitoValor'].includes(i.id)) {
          i.addEventListener('input', onInputCapitalize);
        }
      });
      atualizarPreview();
    };
  </script>
</body>
</html>
